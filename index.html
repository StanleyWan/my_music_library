<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端資源庫</title>
    <!-- 引入 Tailwind CSS 以實現美觀的排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 針對長者設計的基礎字體與平滑過渡效果 */
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: #f4f6f8;
            color: #333333;
        }
        .card-hover {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        /* 隱藏不想顯示的元素 */
        .hidden-item {
            display: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- ======================================================= -->
    <!-- ⬇️⬇️⬇️ 管理員修改區：請在這裡新增或修改你的檔案資料 ⬇️⬇️⬇️ -->
    <!-- 教學重點：請學員只要修改引號 " " 裡面的文字和網址即可 -->
    <!-- ======================================================= -->
    <script>
        const siteData = [
            {
                分類: "影片",           // 只能填寫：影片、照片、文件
                標題: "2026年粵曲演唱片段", 
                簡介: "在社區中心與好友的合唱錄影。",
                網址: "https://www.youtube.com/watch?v=dQw4w9WgXcQ" 
            },
            {
                分類: "文件",
                標題: "帝女花 - 工尺譜",
                簡介: "這是我整理的樂譜，請點擊下載或查看。",
                網址: "https://drive.google.com/drive/"
            },
            {
                分類: "照片",
                標題: "中秋節聯歡晚會相簿",
                簡介: "當晚的精彩活動花絮，大家笑得好開心！",
                網址: "https://photos.google.com/"
            },
            {
                分類: "影片",
                標題: "太極拳晨運教學",
                簡介: "每日早上的太極拳練習影片，適合在家跟著做。",
                網址: "https://www.youtube.com/"
            },
            {
                分類: "文件",
                標題: "長者中心活動時間表",
                簡介: "本月份的所有活動時間及地點安排。",
                網址: "https://drive.google.com/drive/"
            },
            {
                分類: "文件",
                標題: "readtest.pdf",
                簡介: "最新加入的 readtest.pdf 檔案。",
                網址: "./readtest.pdf"
            }
            // 💡 如果要新增，請把上面其中一段 { ... } 複製並貼到底下
        ];
    </script>
    <!-- ======================================================= -->
    <!-- ⬆️⬆️⬆️ 管理員修改區結束 (以下為網頁設計代碼，無需修改) ⬆️⬆️⬆️ -->
    <!-- ======================================================= -->

    <div class="max-w-5xl mx-auto">
        <!-- 網站標題區 -->
        <header class="text-center mb-10 mt-6">
            <h1 class="text-4xl md:text-5xl font-bold text-blue-800 mb-4">📚 我的雲端資源庫</h1>
            <p class="text-xl text-gray-600">點擊下方的分類或卡片，輕鬆瀏覽影片、相簿與文件。</p>
        </header>

        <!-- 分類按鈕區 (導航列) -->
        <div class="flex flex-wrap justify-center gap-3 mb-10">
            <button onclick="filterContent('全部')" class="filter-btn active bg-blue-600 text-white px-6 py-3 rounded-full text-xl font-bold shadow-md hover:bg-blue-700 transition">
                🌟 全部
            </button>
            <button onclick="filterContent('影片')" class="filter-btn bg-white text-gray-700 border-2 border-gray-200 px-6 py-3 rounded-full text-xl font-bold shadow-sm hover:border-blue-400 transition">
                🎥 影片
            </button>
            <button onclick="filterContent('照片')" class="filter-btn bg-white text-gray-700 border-2 border-gray-200 px-6 py-3 rounded-full text-xl font-bold shadow-sm hover:border-blue-400 transition">
                🖼️ 照片
            </button>
            <button onclick="filterContent('文件')" class="filter-btn bg-white text-gray-700 border-2 border-gray-200 px-6 py-3 rounded-full text-xl font-bold shadow-sm hover:border-blue-400 transition">
                📄 文件
            </button>
        </div>

        <!-- 內容顯示區 (卡片將會在這裡自動生成) -->
        <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- JavaScript 會在這裡插入 HTML -->
        </div>

        <!-- 頁尾 -->
        <footer class="text-center mt-16 mb-8 text-gray-500 text-lg">
            <p>本網站內容均連結至 Google Drive / Google Photos / YouTube</p>
        </footer>
    </div>

    <!-- 生成網頁內容的程式邏輯 -->
    <script>
        const contentGrid = document.getElementById('contentGrid');

        // 根據「分類」決定顯示的圖示與按鈕顏色
        function getTypeStyle(type) {
            switch(type) {
                case '影片': return { icon: '🎥', color: 'text-red-600', bg: 'bg-red-50', btn: 'bg-red-500 hover:bg-red-600' };
                case '照片': return { icon: '🖼️', color: 'text-green-600', bg: 'bg-green-50', btn: 'bg-green-500 hover:bg-green-600' };
                case '文件': return { icon: '📄', color: 'text-blue-600', bg: 'bg-blue-50', btn: 'bg-blue-500 hover:bg-blue-600' };
                default: return { icon: '🔗', color: 'text-gray-600', bg: 'bg-gray-50', btn: 'bg-gray-500 hover:bg-gray-600' };
            }
        }

        // 初始化：將資料轉換為卡片並顯示
        function renderCards() {
            contentGrid.innerHTML = ''; // 清空現有內容

            siteData.forEach((item) => {
                const style = getTypeStyle(item.分類);
                
                // 建立卡片 HTML
                const cardHTML = `
                    <div class="card-item bg-white rounded-2xl p-6 shadow-md border border-gray-100 card-hover flex flex-col h-full" data-category="${item.分類}">
                        <div class="flex items-center mb-4">
                            <div class="${style.bg} p-3 rounded-full mr-4 text-2xl">
                                ${style.icon}
                            </div>
                            <h2 class="text-2xl font-bold text-gray-800 line-clamp-2">${item.標題}</h2>
                        </div>
                        <p class="text-gray-600 text-lg mb-6 flex-grow">${item.簡介}</p>
                        <a href="${item.網址}" target="_blank" rel="noopener noreferrer" 
                           class="w-full block text-center ${style.btn} text-white font-bold py-3 px-4 rounded-xl text-xl transition shadow-sm">
                            前往觀看
                        </a>
                    </div>
                `;
                contentGrid.innerHTML += cardHTML;
            });
        }

        // 分類過濾功能
        function filterContent(category) {
            // 更新按鈕外觀
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                if (btn.innerText.includes(category) || (category === '全部' && btn.innerText.includes('全部'))) {
                    btn.className = 'filter-btn active bg-blue-600 text-white px-6 py-3 rounded-full text-xl font-bold shadow-md hover:bg-blue-700 transition';
                } else {
                    btn.className = 'filter-btn bg-white text-gray-700 border-2 border-gray-200 px-6 py-3 rounded-full text-xl font-bold shadow-sm hover:border-blue-400 transition';
                }
            });

            // 過濾卡片
            const cards = document.querySelectorAll('.card-item');
            cards.forEach(card => {
                if (category === '全部' || card.getAttribute('data-category') === category) {
                    card.classList.remove('hidden-item');
                } else {
                    card.classList.add('hidden-item');
                }
            });
        }

        // 網頁載入時執行
        renderCards();
    </script>
</body>
</html>
        });
    </script>
</body>
</html>
